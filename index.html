/* Resalta palabras de técnica/estrategia (topset, backoff, dropset, rest-pause)
   en cualquier texto, dondequiera que aparezcan: notas, RIR, calentamiento, etc. */
const STRATEGY_WORDS = ["rest-pause", "rest pause", "drop set", "dropset", "back-off", "backoff", "topset", "top set"];
const STRATEGY_PATTERN = new RegExp(`(${STRATEGY_WORDS.map((w) => w.replace(/[-\s]/g, "[-\\s]?")).join("|")})`, "gi");

function highlightStrategy(text) {
  if (!text) return text;
  const parts = String(text).split(STRATEGY_PATTERN);
  return parts.map((part, i) =>
    i % 2 === 1
      ? <span key={i} style={{ color: COLORS.yellow, fontWeight: 700 }}>{part}</span>
      : <React.Fragment key={i}>{part}</React.Fragment>
  );
}

function unitLabel(unit) {
  return unit === "nivel" ? "Nivel" : "kg";
}

function getLastLog(logs, exerciseId) {
  const arr = logs[exerciseId];
  if (!arr || arr.length === 0) return null;
  return arr[arr.length - 1];
}

function getSuggestion(exercise, lastLog) {
  if (!lastLog) return null;
  const mainTarget = exercise.targetSets.find((s) => s.isMain) || exercise.targetSets[0];
  const loggedMain = lastLog.sets.find((s) => s.targetId === mainTarget.id);
  if (!loggedMain || loggedMain.reps === "" || loggedMain.reps == null) return null;
  const reps = Number(loggedMain.reps);
  if (reps >= exercise.repRangeMax) {
    return {
      type: "up",
      text: `Techo del rango (${exercise.repRangeMax}). La próxima subí ${exercise.incrementStep} ${unitLabel(exercise.weightUnit)} y arrancá cerca del piso.`,
    };
  }
  if (reps <= exercise.repRangeMin) {
    return { type: "hold", text: `Piso del rango (${exercise.repRangeMin}). Mantené el peso y sumá reps antes de subir.` };
  }
  return { type: "reps", text: `Bien. La próxima sumá 1 rep más en la serie principal (ibas en ${reps}, techo ${exercise.repRangeMax}).` };
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const diff = Date.now() - new Date(dateStr).getTime();
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

/* ============================================================
   RACHA / HISTORIAL — calculado a partir de los completados
   ============================================================ */

function dayHasActivity(completions, key) {
  const day = completions[key];
  return !!day && Object.values(day).some(Boolean);
}

function computeStreak(completions) {
  let d = new Date();
  let streak = 0;
  if (dayHasActivity(completions, dateKey(d))) { streak = 1; }
  d.setDate(d.getDate() - 1);
  while (dayHasActivity(completions, dateKey(d))) { streak++; d.setDate(d.getDate() - 1); }
  return streak;
}
function computeTotalDaysTrained(completions) {
  return Object.keys(completions).filter((k) => dayHasActivity(completions, k)).length;
}
function computeTotalExercisesCompleted(completions) {
  let total = 0;
  Object.values(completions).forEach((day) => { total += Object.values(day).filter(Boolean).length; });
  return total;
}
function computeHistory(exercises, completions) {
  return Object.keys(completions)
    .filter((k) => dayHasActivity(completions, k))
    .sort((a, b) => b.localeCompare(a))
    .map((key) => {
      const day = completions[key];
      const doneIds = Object.keys(day).filter((id) => day[id]);
      const exObjs = doneIds.map((id) => exercises.find((e) => e.id === id)).filter(Boolean);
      const pageLabels = Array.from(new Set(exObjs.map((e) => e.page))).map((pid) => PAGES.find((p) => p.id === pid)?.label).filter(Boolean);
      return { date: key, count: doneIds.length, pages: pageLabels };
    });
}

/* Tira de 7 días: programado, hecho, descanso o salteado */
function WeekStrip({ exercises, completions, overrides }) {
  const today = new Date();
  const todayKeyStr = dateKey(today);

  return (
    <div className="flex justify-between gap-1.5">
      {DAY_LABELS.map((label, i) => {
        const jsDay = DAY_LABEL_TO_JSDAY[i];
        const diff = jsDay - today.getDay();
        const d = new Date(today);
        d.setDate(today.getDate() + diff);
        const key = dateKey(d);
        const pageId = overrides[key] || WEEKLY_SCHEDULE[jsDay];
        const isToday = key === todayKeyStr;
        const dayCompletions = completions[key] || {};
        const list = pageId ? exercises.filter((e) => e.page === pageId && e.active) : [];
        const doneCount = list.filter((e) => dayCompletions[e.id]).length;
        const isDone = list.length > 0 && doneCount === list.length;
        const isPast = d < today && !isToday;
        const isMissed = isPast && pageId && doneCount === 0;

        let circleStyle, content;
        if (isToday) {
          circleStyle = { ...glassYellow, padding: 0 };
          content = <span className="text-[11px] font-bold" style={{ color: "#1A0A00", fontFamily: FONT_MONO }}>{d.getDate()}</span>;
        } else if (isDone) {
          circleStyle = { backgroundColor: "rgba(255,122,41,0.18)", border: "1px solid rgba(255,122,41,0.45)", boxShadow: "0 0 10px rgba(255,122,41,0.25)" };
          content = <Check size={13} color={COLORS.yellow} />;
        } else if (isMissed) {
          circleStyle = { border: "1px solid rgba(255,82,71,0.4)", backgroundColor: "rgba(255,82,71,0.06)" };
          content = <span className="text-[10px]" style={{ color: COLORS.red, fontFamily: FONT_MONO }}>{d.getDate()}</span>;
        } else if (!pageId) {
          circleStyle = { backgroundColor: "rgba(255,255,255,0.03)" };
          content = <span style={{ fontSize: 11 }}>🌙</span>;
        } else {
          circleStyle = { border: "1px solid rgba(255,255,255,0.12)" };
          content = <span className="text-[10px]" style={{ color: COLORS.textFaint, fontFamily: FONT_MONO }}>{d.getDate()}</span>;
        }

        return (
          <div key={label} className="flex flex-col items-center gap-1.5 flex-1">
            <span className="text-[9.5px]" style={{ color: isToday ? COLORS.yellow : COLORS.textFaint, fontFamily: FONT_BODY, fontWeight: isToday ? 700 : 500 }}>{label}</span>
            <div className="w-8 h-8 rounded-full flex items-center justify-center">
              <div className="w-8 h-8 rounded-full flex items-center justify-center" style={circleStyle}>{content}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function HomeScreen({ exercises, logs, completions, overrides, onOpenPage, onSetOverride }) {
  const [tab, setTab] = useState("semana");
  const [confirmPage, setConfirmPage] = useState(null);
  const pressTimer = useRef(null);
  const longPressFired = useRef(false);

  const todayKeyStr = dateKey();

  const todayPageId = overrides[todayKeyStr] || scheduledPageId;
  const completionsToday = completions[todayKeyStr] || {};

  function startPress(pageId) {
    longPressFired.current = false;
    pressTimer.current = setTimeout(() => {
      longPressFired.current = true;
      setConfirmPage(pageId);
    }, 500);
  }
  function clearPress() {
    if (pressTimer.current) clearTimeout(pressTimer.current);
  }
  function handleCardClick(pageId) {
    if (!longPressFired.current) onOpenPage(pageId);
  }

  function confirmOverride() {
    onSetOverride(todayKeyStr, confirmPage);

    setConfirmPage(null);
    onOpenPage(pageId);

      <div style={{ height: 180 }}>

          <RadarChart data={radarData} cx="50%" cy="50%" outerRadius="68%">

/* ── UI: Gráfico de progresión — ejercicio con más historial ─────────────── */
function ProgressionChart({ exercises, logs }) {
  const withLogs = exercises
    .filter((e) => e.active && (logs[e.id] || []).length >= 1)
    .map((e) => ({ e, n: (logs[e.id] || []).length }))
    .sort((a, b) => b.n - a.n)
    .slice(0, 1);

  if (withLogs.length === 0) {
    return (
      <div className="enter-up mb-4 px-4 py-5 flex flex-col items-center gap-2" style={{ ...glass, borderRadius: 28 }}>
        <p style={{ fontSize: 13, fontWeight: 700, color: COLORS.yellow, fontFamily: FONT_BODY, textTransform: "uppercase", letterSpacing: "0.1em" }}>Progresión</p>
        <p style={{ fontSize: 12, color: COLORS.textFaint, fontFamily: FONT_BODY, textAlign: "center" }}>Registrá al menos una sesión para ver tu curva de progresión.</p>
      </div>
    );
  }

  const primary = withLogs[0].e;
  const allEntries = (logs[primary.id] || []).slice(-10);
  const chartData = allEntries.map((entry) => {
    const peakWeight = Math.max(0, ...(entry.sets || []).map((s) => Number(s.weight) || 0));
    const label = new Date(entry.date).toLocaleDateString("es-AR", { day: "numeric", month: "numeric" });
    return { label, peso: peakWeight };
  }).filter((d) => d.peso > 0);

  if (chartData.length < 1) return null;

  const minVal = Math.min(...chartData.map((d) => d.peso)) * 0.92;
  const maxVal = Math.max(...chartData.map((d) => d.peso)) * 1.04;

  return (
    <div className="enter-up mb-4 px-4 py-3.5" style={{ ...glass, borderRadius: 28 }}>
      <div className="flex items-start justify-between mb-1">
        <div>
          <p style={{ fontSize: 10, fontWeight: 700, color: COLORS.yellow, fontFamily: FONT_BODY, textTransform: "uppercase", letterSpacing: "0.12em" }}>Progresión</p>
          <p style={{ fontSize: 13, fontWeight: 700, color: COLORS.text, fontFamily: FONT_DISPLAY, marginTop: 2 }}>{primary.name}</p>
        </div>
        <div style={{ textAlign: "right" }}>
          <p style={{ fontSize: 22, fontWeight: 800, color: COLORS.yellow, fontFamily: FONT_DISPLAY, lineHeight: 1 }}>{chartData[chartData.length - 1].peso}</p>
          <p style={{ fontSize: 9, color: COLORS.textFaint, fontFamily: FONT_BODY }}>kg último</p>
        </div>
      </div>
      <div style={{ height: 110, marginTop: 8 }}>
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={chartData} margin={{ top: 4, right: 2, left: -32, bottom: 0 }}>
            <defs>
              <linearGradient id="progGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={COLORS.yellow} stopOpacity={0.45} />
                <stop offset="100%" stopColor={COLORS.yellow} stopOpacity={0.02} />
              </linearGradient>
            </defs>
            <XAxis dataKey="label" tick={{ fill: COLORS.textFaint, fontSize: 8, fontFamily: FONT_BODY }} axisLine={false} tickLine={false} interval="preserveStartEnd" />
            <YAxis domain={[minVal, maxVal]} tick={{ fill: COLORS.textFaint, fontSize: 8, fontFamily: FONT_MONO }} axisLine={false} tickLine={false} width={40} />
            <Tooltip
              contentStyle={{ background: "rgba(20,12,6,0.92)", border: `1px solid rgba(255,122,41,0.4)`, borderRadius: 12, fontSize: 11, color: COLORS.text, backdropFilter: "blur(12px)" }}
              formatter={(v) => [`${v} kg`, ""]}
              labelStyle={{ color: COLORS.textDim, fontSize: 9 }}
            />
            <Area type="monotone" dataKey="peso" stroke={COLORS.yellow} strokeWidth={2.5} fill="url(#progGrad)" dot={{ fill: COLORS.yellow, r: 3.5, strokeWidth: 0 }} activeDot={{ r: 6, fill: COLORS.yellow, strokeWidth: 0 }} />
          </AreaChart>
        </ResponsiveContainer>
      </div>
      {chartData.length >= 2 && (() => {
        const first = chartData[0].peso, last = chartData[chartData.length - 1].peso;
        const diff = last - first, pct = first > 0 ? Math.round((diff / first) * 100) : 0;
        return (
          <p style={{ fontSize: 10, color: pct >= 0 ? "#6EE8A0" : "#FF9060", fontFamily: FONT_BODY, marginTop: 6 }}>
            {pct >= 0 ? "↑" : "↓"} {Math.abs(pct)}% vs primera sesión registrada
          </p>
        );
      })()}
    </div>
  );
}

function ExerciseBlock({ exercise, logs, onSaveLog, onEdit, index, done, onToggleDone }) {
  const last = getLastLog(logs, exercise.id);
  const [values, setValues] = useState(() => {
    const init = {};
    exercise.targetSets.forEach((t) => {
      const prevSet = last?.sets.find((s) => s.targetId === t.id);
      init[t.id] = {
        weight: prevSet ? String(prevSet.weight) : String(t.weightRef),
        reps: prevSet ? String(prevSet.reps) : "",
      };
    });
    return init;
  });
  const [savedFlash, setSavedFlash] = useState(false);
  const [hype, setHype] = useState(null);
  const [trainerFeedback, setTrainerFeedback] = useState(null);
  const mounted = useRef(false);
  const debounceRef = useRef(null);

  // Análisis estáticos (se calculan una vez por render del bloque)
  const plateau = useMemo(() => detectPlateau(logs, exercise.id), [logs, exercise.id]);
  const prPrediction = useMemo(() => predictPR(logs, exercise.id, exercise.incrementStep || 2.5), [logs, exercise.id, exercise.incrementStep]);
  const selfComp = useMemo(() => computeSelfComparison(logs, exercise.id, 60), [logs, exercise.id]);

  useEffect(() => {
    if (!mounted.current) { mounted.current = true; return; }
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      const sets = exercise.targetSets.map((t) => ({
        targetId: t.id,
        label: t.label,
        weight: values[t.id].weight === "" ? t.weightRef : Number(values[t.id].weight),
        reps: values[t.id].reps === "" ? "" : Number(values[t.id].reps),
      }));
      const hasAnyReps = sets.some((s) => s.reps !== "" && s.reps != null);
      if (hasAnyReps) {
        onSaveLog(exercise.id, { date: new Date().toISOString(), sets });
        setSavedFlash(true);
        setTimeout(() => setSavedFlash(false), 1400);
        // Entrenador virtual: analizar la distribución de reps
        const fb = analyzeSetFeedback(sets.filter((s) => s.reps !== "" && s.reps != null));
        if (fb) { setTrainerFeedback(fb); setTimeout(() => setTrainerFeedback(null), 5000); }
      }
    }, 700);
    return () => clearTimeout(debounceRef.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [values]);

  function update(targetId, field, val) {
    setValues((v) => ({ ...v, [targetId]: { ...v[targetId], [field]: val } }));
  }

  function handleToggleDone() {
    const turningOn = !done;
    onToggleDone(exercise.id, turningOn);
    if (turningOn) {
      setHype(HYPE_MESSAGES[Math.floor(Math.random() * HYPE_MESSAGES.length)]);
      setTimeout(() => setHype(null), 1800);
    }
  }

  const suggestion = getSuggestion(exercise, last);
  const unit = unitLabel(exercise.weightUnit);
  const dTag = dayTagLabel(exercise.dayTag);
  const infoText = [exercise.warmup, exercise.notes].filter(Boolean).join("  ·  ");

  return (
    <div className="enter-up p-4 mb-3" style={{  ...glass, ...stagger(index, 40), borderRadius: 34 }}>
      <div className="flex items-start justify-between gap-2 mb-1">
        <button onClick={handleToggleDone} className="shrink-0 mt-0.5 active:scale-90 transition-transform">
          <div
            className="w-6 h-6 rounded-full flex items-center justify-center"
            style={done ? { ...glassYellow, padding: 0 } : { border: "1.5px solid rgba(255,255,255,0.22)", backgroundColor: "rgba(255,255,255,0.03)" }}
          >
            {done && <Check size={13} color="#1A0A00" strokeWidth={3} />}
          </div>
        </button>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-1.5 flex-wrap mb-0.5">
            <span className="text-[10px] font-bold tracking-[0.1em] uppercase" style={{ color: COLORS.yellow, fontFamily: FONT_BODY }}>{exercise.muscleGroup}</span>
            {dTag && <Pill>{dTag}</Pill>}
            {hype && <span className="pop-in text-[10px] font-bold" style={{ color: COLORS.yellow, fontFamily: FONT_BODY }}>{hype}</span>}
          </div>
          <h3 className="text-[15.5px] font-bold leading-tight" style={{ color: COLORS.text, fontFamily: FONT_BODY }}>{exercise.name}</h3>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          {savedFlash && (
            <span className="pop-in flex items-center gap-1 text-[10px]" style={{ color: COLORS.yellow, fontFamily: FONT_BODY }}>
              <Check size={11} /> guardado
            </span>
          )}
          <button onClick={() => onEdit(exercise.id)} className="p-1 rounded-full active:bg-white/10">
            <Pencil size={14} color={COLORS.textFaint} />
          </button>
        </div>
      </div>

      <div className="flex flex-wrap gap-1.5 mt-2 mb-2">
        <Pill tone="teal">{exercise.repRangeMin}-{exercise.repRangeMax} reps</Pill>
        {exercise.rir && exercise.rir !== "-" && <Pill>RIR {highlightStrategy(exercise.rir)}</Pill>}
      </div>

      {/* Badges de análisis */}
      <PlateauBadge plateau={plateau} />
      <PRPredictionBadge pr={prPrediction} />
      <SelfComparisonBadge comp={selfComp} />

      {infoText && (
        <p className="text-[11.5px] leading-relaxed mb-3" style={{ color: COLORS.textDim, fontFamily: FONT_BODY }}>
          {highlightStrategy(infoText)}
        </p>
      )}

      <div className="flex flex-col gap-1.5">
        {exercise.targetSets.map((t) => (
          <div key={t.id} className="px-3 py-2 flex items-center gap-2.5" style={{  backgroundColor: "rgba(255,255,255,0.025)", borderRadius: 22 }}>
            <div className="flex-1 min-w-0">
              <p className="text-[12px] font-medium truncate" style={{ color: COLORS.text, fontFamily: FONT_BODY }}>{highlightStrategy(t.label)}</p>
              <p className="text-[10px]" style={{ color: COLORS.textFaint, fontFamily: FONT_MONO }}>obj {t.repsTarget}{t.drop ? "+drop" : ""}</p>
            </div>
            <input
              inputMode="decimal"
              value={values[t.id].weight}
              onChange={(ev) => update(t.id, "weight", ev.target.value)}
              className="w-14 text-center py-1.5 text-[13.5px] outline-none"
              style={{ ...glassInput, color: COLORS.yellow, fontFamily: FONT_MONO, borderRadius: 16 }}
            />
            <span className="text-[10px]" style={{ color: COLORS.textDim, fontFamily: FONT_MONO }}>{unit}</span>
            <span style={{ color: COLORS.textFaint, fontSize: 11 }}>×</span>
            <input
              inputMode="numeric"
              placeholder="reps"
              value={values[t.id].reps}
              onChange={(ev) => update(t.id, "reps", ev.target.value)}
              className="w-14 text-center py-1.5 text-[13.5px] outline-none"
              style={{ ...glassInput, color: COLORS.text, fontFamily: FONT_MONO, borderRadius: 16 }}
            />
          </div>
        ))}
      </div>

      {/* Feedback del entrenador virtual — aparece 5 seg tras guardar */}
      <VirtualTrainerCard feedback={trainerFeedback} />

      {suggestion && (
        <div className="flex items-center gap-1.5 mt-2.5">
          {suggestion.type === "up" ? <ArrowUp size={12} color={COLORS.yellow} /> : <TrendingUp size={12} color={COLORS.textFaint} />}
          <p className="text-[11px] leading-snug" style={{ color: suggestion.type === "up" ? COLORS.yellow : COLORS.textFaint, fontFamily: FONT_BODY }}>
            {suggestion.text}
          </p>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   PÁGINA — todos los ejercicios de un grupo, en una sola hoja
   ============================================================ */

function PageScreen({ page, exercises, logs, onBack, onSaveLog, onEdit, onAddExercise, completionsToday, onToggleDone }) {
  const list = exercises.filter((e) => e.page === page.id && e.active);
  const doneCount = list.filter((e) => completionsToday[e.id]).length;
  const allDone = list.length > 0 && doneCount === list.length;
  // Grupos musculares únicos de esta página
  const muscleGroups = [...new Set(list.map((e) => e.muscleGroup))];
  const recoveries = muscleGroups.map((mg) => ({ mg, data: computeMuscleRecovery(exercises, logs, mg) })).filter((r) => r.data);

  return (
    <div className="pb-28 page-enter">
      <TopBar title={page.label} onBack={onBack} icon={page.icon} accent />
      <div className="px-4 pt-4">
        {/* Recovery bars — compact */}
        {recoveries.length > 0 && (
          <div className="enter-up mb-3 px-3.5 py-3" style={{ ...glass, borderRadius: 22 }}>
            <p className="text-[9.5px] font-bold uppercase tracking-widest mb-2.5" style={{ color: COLORS.yellow, fontFamily: FONT_BODY }}>Recuperación muscular</p>
            <div className="flex flex-col gap-2">
              {recoveries.map(({ mg, data }) => (
                <MuscleRecoveryRow key={mg} label={mg} recovery={data.recovery} recommendation={data.recommendation} fatigue={data.fatigue} />
              ))}
            </div>
            {recoveries[0]?.data?.recommendation && (
              <p className="text-[9px] mt-2" style={{ color: COLORS.textFaint, fontFamily: FONT_BODY }}>{recoveries[0].data.recommendation}</p>
            )}
          </div>
        )}

        {list.length > 0 && (
          <div className="enter-up px-4 py-3 mb-4 flex items-center gap-3" style={{ ...glass, borderRadius: 24 }}>
            <div className="flex-1 h-2 rounded-full overflow-hidden" style={{ background: "rgba(255,255,255,0.08)" }}>
              <div className="h-full rounded-full transition-all duration-500" style={{ width: `${(doneCount / list.length) * 100}%`, background: COLORS.yellow, boxShadow: `0 0 10px ${COLORS.yellow}` }} />
            </div>
            <span className="text-[11.5px] shrink-0" style={{ color: allDone ? COLORS.yellow : COLORS.textDim, fontFamily: FONT_MONO }}>
              {allDone ? "🔥 Completo" : `${doneCount}/${list.length}`}
            </span>
          </div>
        )}
        {list.length === 0 && (
          <p className="text-[13px] mt-6 text-center" style={{ color: COLORS.textDim }}>Todavía no hay ejercicios activos acá.</p>
        )}
        {list.map((e, i) => (
          <ExerciseBlock
            key={e.id}
            exercise={e}
            logs={logs}
            onSaveLog={onSaveLog}
            onEdit={onEdit}
            index={i}
            done={!!completionsToday[e.id]}
            onToggleDone={onToggleDone}
          />
        ))}
        <button
          onClick={() => onAddExercise(page.id)}
          className="mt-1 w-full flex items-center justify-center gap-1.5 rounded-full py-3.5 active:scale-[0.98] transition-transform"
          style={{ border: `1.5px dashed rgba(255,122,41,0.3)`, color: COLORS.yellow }}
        >
          <Plus size={16} />
          <span className="text-[13px] font-semibold uppercase tracking-wide" style={{ fontFamily: FONT_BODY }}>Agregar ejercicio</span>
        </button>
      </div>
    </div>
  );
}

/* Estancamiento / progreso por ejercicio (serie principal) */
function computeInsights(exercises, logs) {
  const stuck = [];
  const progressing = [];
  const trainedDays = new Set();

  exercises.filter((e) => e.active).forEach((e) => {
    const arr = logs[e.id] || [];
    arr.forEach((entry) => trainedDays.add(new Date(entry.date).toDateString()));
    if (arr.length < 2) return;
    const mainTarget = e.targetSets.find((t) => t.isMain) || e.targetSets[0];
    const recent = arr.slice(-3)
      .map((entry) => entry.sets.find((s) => s.targetId === mainTarget.id))
      .filter((s) => s && s.reps !== "" && s.reps != null)
      .map((s) => ({ weight: Number(s.weight), reps: Number(s.reps) }));
    if (recent.length < 2) return;
    const first = recent[0];
    const last = recent[recent.length - 1];
    if (last.weight === first.weight && last.reps <= first.reps) {
      stuck.push({ name: e.name, weight: last.weight, unit: unitLabel(e.weightUnit), n: recent.length });
    } else if (last.weight > first.weight || (last.weight === first.weight && last.reps > first.reps)) {
      progressing.push({ name: e.name, from: first, to: last, unit: unitLabel(e.weightUnit) });
    }
  });

  const now = new Date();
  let last7 = 0;
  trainedDays.forEach((d) => { if ((now - new Date(d)) / 86400000 < 7) last7++; });

  return { stuck: stuck.slice(0, 3), progressing: progressing.slice(0, 3), last7 };
}

/* Frecuencia por página: ¿muy seguido (sin descanso) o muy espaciado? */
function computeFrequencyInsights(exercises, logs) {
  const flags = [];
  PAGES.forEach((p) => {
    const datesSet = new Set();
    exercises.filter((e) => e.page === p.id && e.active && e.dayTag !== "extra").forEach((e) => {
      (logs[e.id] || []).forEach((entry) => datesSet.add(new Date(entry.date).toDateString()));
    });
    const dates = Array.from(datesSet).map((d) => new Date(d)).sort((a, b) => a - b);
    const now = new Date();
    const recent = dates.filter((d) => (now - d) / 86400000 < 30);
    if (recent.length < 2) return;
    const gaps = [];
    for (let i = 1; i < recent.length; i++) gaps.push((recent[i] - recent[i - 1]) / 86400000);
    const avgGap = gaps.reduce((a, b) => a + b, 0) / gaps.length;
    if (avgGap < 2) {
      flags.push({ type: "over", text: `${p.label}: promedio ${avgGap.toFixed(1)} días entre sesiones — poco descanso para el mismo grupo.` });
    } else if (avgGap > 5) {
      flags.push({ type: "under", text: `${p.label}: promedio ${avgGap.toFixed(1)} días entre sesiones — más espaciado que tu objetivo de frecuencia 2.` });
    }
  });
  return flags;
}

/* Volumen semanal (últimas 7 semanas) para el gráfico */
function computeWeeklyVolume(exercises, logs) {
  const weeks = 7;
  const now = new Date();
  const buckets = [];
  for (let i = weeks - 1; i >= 0; i--) {
    const start = new Date(now);
    start.setHours(0, 0, 0, 0);
    start.setDate(now.getDate() - now.getDay() - i * 7);
    const end = new Date(start);
    end.setDate(start.getDate() + 7);
    buckets.push({ start, end, sets: 0 });
  }
  exercises.forEach((e) => {
    (logs[e.id] || []).forEach((entry) => {
      const d = new Date(entry.date);
      const b = buckets.find((bk) => d >= bk.start && d < bk.end);
      if (b) b.sets += entry.sets.filter((s) => s.reps !== "" && s.reps != null).length;
    });
  });
  return buckets.map((b, i) => ({ label: i === buckets.length - 1 ? "Hoy" : `-${buckets.length - 1 - i}sem`, sets: b.sets }));
}

function computeDaysTrainedLast7(exercises, logs) {
  const now = new Date();
  const days = new Set();
  exercises.forEach((e) => (logs[e.id] || []).forEach((entry) => {
    const d = new Date(entry.date);
    if ((now - d) / 86400000 < 7) days.add(d.toDateString());
  }));
  return days.size;
}

function buildCoachContext(exercises, logs) {
  const lines = [];
  exercises.filter((e) => e.active).forEach((e) => {
    const arr = logs[e.id] || [];
    if (arr.length === 0) return;
    const mainTarget = e.targetSets.find((t) => t.isMain) || e.targetSets[0];
    const recent = arr.slice(-4)
      .map((entry) => entry.sets.find((s) => s.targetId === mainTarget.id))
      .filter((s) => s && s.reps !== "" && s.reps != null)
      .map((s) => `${s.weight}${unitLabel(e.weightUnit)}x${s.reps}`);
    if (recent.length) lines.push(`- ${e.name} [pág: ${e.page}] (rango ${e.repRangeMin}-${e.repRangeMax} reps): ${recent.join(" → ")}`);
  });
  return lines.join("\n") || "Todavía no hay entrenamientos registrados.";
}

/* ── 1. DETECCIÓN DE PLATEAU ─────────────────────────────────────────────────
   Peso sin subir 3 semanas → plateau de carga.
   Reps sin subir 4 semanas (al mismo peso) → plateau de reps. */
function detectPlateau(logs, exerciseId) {
  const entries = (logs[exerciseId] || []);
  if (entries.length < 4) return null;
  const now = new Date();
  const msWeek = 7 * 24 * 60 * 60 * 1000;
  const sessions = entries.map((e) => ({
    date: new Date(e.date),
    maxWeight: Math.max(0, ...(e.sets || []).map((s) => Number(s.weight) || 0)),
    maxReps: Math.max(0, ...(e.sets || []).map((s) => Number(s.reps) || 0)),
  })).filter((s) => s.maxWeight > 0);
  if (sessions.length < 4) return null;
  const last3w = sessions.filter((s) => now - s.date <= 3 * msWeek);
  const prev3w = sessions.filter((s) => now - s.date > 3 * msWeek && now - s.date <= 6 * msWeek);
  const last4w = sessions.filter((s) => now - s.date <= 4 * msWeek);
  const prev4w = sessions.filter((s) => now - s.date > 4 * msWeek && now - s.date <= 8 * msWeek);
  if (last3w.length === 0 || prev3w.length === 0) return null;
  const recentW = Math.max(...last3w.map((s) => s.maxWeight));
  const baseW = Math.max(...prev3w.map((s) => s.maxWeight));
  const weightPlateau = recentW <= baseW;
  const repsPlateau = last4w.length > 0 && prev4w.length > 0 &&
    Math.max(...last4w.map((s) => s.maxReps)) <= Math.max(...prev4w.map((s) => s.maxReps));
  if (!weightPlateau && !repsPlateau) return null;
  return {
    type: weightPlateau ? "weight" : "reps",
    weeks: weightPlateau ? 3 : 4,
    suggestions: ["Probá microcarga (+1 kg)", "Reducí volumen 1 semana", "Cambiá el rango de reps"],
  };
}

/* ── 2. FATIGA Y RECUPERACIÓN POR GRUPO MUSCULAR ──────────────────────────── */
function computeMuscleRecovery(exercises, logs, muscleGroup) {
  const mExercises = exercises.filter((e) => e.muscleGroup === muscleGroup && e.active);
  if (mExercises.length === 0) return null;
  const now = new Date();
  const msWeek = 7 * 24 * 60 * 60 * 1000;
  let setsThisWeek = 0, lastTrainedDays = null;
  const perfRecent = [], perfPrev = [];
  mExercises.forEach((e) => {
    (logs[e.id] || []).forEach((entry) => {
      const d = new Date(entry.date);
      const days = Math.floor((now - d) / 86400000);
      if (lastTrainedDays === null || days < lastTrainedDays) lastTrainedDays = days;
      if (now - d <= msWeek) {
        setsThisWeek += (entry.sets || []).filter((s) => s.reps !== "" && s.reps != null).length;
        const peak = Math.max(0, ...(entry.sets || []).map((s) => (Number(s.weight)||0) * (Number(s.reps)||0)));
        perfRecent.push(peak);
      } else if (now - d <= 2 * msWeek) {
        const peak = Math.max(0, ...(entry.sets || []).map((s) => (Number(s.weight)||0) * (Number(s.reps)||0)));
        perfPrev.push(peak);
      }
    });
  });
  // recovery 0-100 basado en días desde último entrenamiento
  let recovery = lastTrainedDays === null ? 100 : lastTrainedDays === 0 ? 25 : lastTrainedDays === 1 ? 60 : lastTrainedDays === 2 ? 82 : 100;
  const optimalSets = 12;
  if (setsThisWeek > optimalSets * 1.6) recovery = Math.max(recovery - 28, 10);
  else if (setsThisWeek > optimalSets) recovery = Math.max(recovery - 12, 30);
  const avgRecent = perfRecent.length ? perfRecent.reduce((a, b) => a + b, 0) / perfRecent.length : 0;
  const avgPrev = perfPrev.length ? perfPrev.reduce((a, b) => a + b, 0) / perfPrev.length : 0;
  const trend = avgPrev > 0 ? (avgRecent - avgPrev) / avgPrev : null;
  const fatigue = recovery < 40 ? "alta" : recovery < 65 ? "moderada" : "baja";
  const perfLabel = trend === null ? null : trend > 0.04 ? "↑ Subiendo" : trend < -0.04 ? "↓ Bajando" : "→ Estable";
  let recommendation;
  if (recovery < 40) recommendation = `Considerá reducir 2 series esta sesión`;
  else if (recovery < 65) recommendation = `Mantené el volumen, priorizá la técnica`;
  else recommendation = `Buenas condiciones para entrenar fuerte`;
  return { recovery, fatigue, setsThisWeek, lastTrainedDays, perfLabel, recommendation };
}

/* ── 3. PREDICCIÓN DE PR ─────────────────────────────────────────────────────
   Estima probabilidad de lograr el siguiente escalón de peso hoy. */
function predictPR(logs, exerciseId, incrementStep = 2.5) {
  const entries = (logs[exerciseId] || []);
  if (entries.length < 3) return null;
  let bestWeight = 0, bestReps = 0;
  entries.forEach((e) => {
    (e.sets || []).forEach((s) => {
      const w = Number(s.weight) || 0, r = Number(s.reps) || 0;
      if (w > bestWeight || (w === bestWeight && r > bestReps)) { bestWeight = w; bestReps = r; }
    });
  });
  if (bestWeight === 0) return null;
  const recent = entries.slice(-4).map((e) => Math.max(0, ...(e.sets || []).map((s) => Number(s.weight) || 0)));
  const isImproving = recent.length >= 2 && recent[recent.length - 1] >= recent[recent.length - 2];
  const last = entries[entries.length - 1];
  const daysSince = last ? Math.floor((new Date() - new Date(last.date)) / 86400000) : null;
  const wellRested = daysSince !== null && daysSince >= 2 && daysSince <= 5;
  let prob = 45 + (isImproving ? 22 : 0) + (wellRested ? 16 : 0) + (entries.length > 8 ? 10 : 0);
  prob = Math.min(prob, 93);
  return { currentPR: { weight: bestWeight, reps: bestReps }, nextTarget: { weight: bestWeight + incrementStep, reps: Math.max(bestReps - 1, 5) }, probability: Math.round(prob) };
}

/* ── 4. VOLUMEN SEMANAL POR MÚSCULO (con rangos óptimos) ─────────────────── */
function computeMuscleSetsWeek(exercises, logs) {
  const now = new Date();
  const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
  const optimal = { Pecho: [10, 20], Espalda: [10, 25], Hombros: [12, 22], Bíceps: [10, 20], Tríceps: [10, 18], Piernas: [10, 20], Abs: [10, 25] };
  const data = {};
  exercises.filter((e) => e.active).forEach((e) => {
    if (!data[e.muscleGroup]) data[e.muscleGroup] = 0;
    (logs[e.id] || []).filter((entry) => new Date(entry.date) >= weekAgo).forEach((entry) => {
      data[e.muscleGroup] += (entry.sets || []).filter((s) => s.reps !== "" && s.reps != null).length;
    });
  });
  return Object.entries(data).map(([muscle, sets]) => {
    const [min, max] = optimal[muscle] || [8, 20];
    const status = sets === 0 ? "none" : sets < min * 0.6 ? "low" : sets > max ? "high" : "ok";
    return { muscle, sets, min, max, status };
  }).sort((a, b) => b.sets - a.sets);
}

/* ── 5. COMPARACIÓN CONTRA VOS MISMO (ventana flexible) ─────────────────── */
function computeSelfComparison(logs, exerciseId, daysBack = 90) {
  const entries = (logs[exerciseId] || []);
  if (entries.length < 2) return null;
  const bestOf = (arr) => arr.reduce((best, e) => {
    const w = Math.max(0, ...(e.sets||[]).map((s) => Number(s.weight)||0));
    const r = Math.max(0, ...(e.sets||[]).map((s) => Number(s.reps)||0));
    return w > best.weight ? { weight: w, reps: r, date: e.date } : best;
  }, { weight: 0, reps: 0, date: "" });
  const now = new Date();
  const cutoff = new Date(now - daysBack * 86400000);
  // Busca sesiones 'alrededor' del período
  const older = entries.filter((e) => { const d = new Date(e.date); return d <= new Date(cutoff.getTime() + 21*86400000) && d >= new Date(cutoff.getTime() - 21*86400000); });
  const olderSample = older.length ? older : [entries[0]];
  const recentSample = entries.slice(-3);
  if (olderSample[0] === recentSample[recentSample.length-1]) return null;
  const then = bestOf(olderSample);
  const nowB = bestOf(recentSample);
  if (then.weight === 0 || nowB.weight === 0) return null;
  const thenVol = then.weight * then.reps;
  const nowVol = nowB.weight * nowB.reps;
  const improvement = thenVol > 0 ? Math.round(((nowVol - thenVol) / thenVol) * 100) : 0;
  const actualDays = Math.round(Math.abs(new Date(nowB.date || now) - new Date(then.date)) / 86400000) || daysBack;
  return { then, now: nowB, improvement, daysApart: actualDays };
}

/* ── 6. ENTRENADOR VIRTUAL — feedback post-serie ─────────────────────────── */
function analyzeSetFeedback(sets) {
  const filled = (sets || []).map((s) => Number(s.reps)).filter((r) => r > 0);
  if (filled.length < 2) return null;
  const first = filled[0], last = filled[filled.length - 1];
  const dropPct = ((first - last) / first) * 100;
  if (dropPct > 38) return { severity: "high", icon: "⚠️", message: `Caída grande entre series (${filled.join("→")} reps). Probablemente poco descanso o peso muy alto.` };
  if (dropPct > 18) return { severity: "medium", icon: "💡", message: `Caída moderada (${filled.join("→")} reps). Descansá 15-20 seg más entre series.` };
  if (dropPct <= 5 && first > 0) return { severity: "good", icon: "🔥", message: `Series consistentes (${filled.join("→")} reps). Podés intentar subir el peso.` };
  return null;
}

/* ── 7. RESUMEN SEMANAL ───────────────────────────────────────────────────── */
function computeWeeklySummary(exercises, logs, completions) {
  const now = new Date();
  const weekAgo = new Date(now - 7 * 86400000);
  const prevWeekAgo = new Date(now - 14 * 86400000);
  const sessionsThisWeek = Object.keys(completions).filter((k) => new Date(k) >= weekAgo).length;
  let volThis = 0, volPrev = 0, strThis = 0, strPrev = 0;
  exercises.filter((e) => e.active).forEach((e) => {
    (logs[e.id] || []).forEach((entry) => {
      const d = new Date(entry.date);
      const v = (entry.sets || []).reduce((s, st) => s + (Number(st.weight)||0) * (Number(st.reps)||1), 0);
      const peakW = Math.max(0, ...(entry.sets || []).map((s) => Number(s.weight)||0));
      if (d >= weekAgo) { volThis += v; strThis = Math.max(strThis, peakW); }
      else if (d >= prevWeekAgo) { volPrev += v; strPrev = Math.max(strPrev, peakW); }
    });
  });
  const volChange = volPrev > 0 ? Math.round(((volThis - volPrev) / volPrev) * 100) : null;
  const strChange = strPrev > 0 ? Math.round(((strThis - strPrev) / strPrev) * 100) : null;
  // Fatiga warnings: grupos con recovery < 50%
  const muscleGroups = [...new Set(exercises.filter((e) => e.active).map((e) => e.muscleGroup))];
  const fatigueWarnings = muscleGroups.map((mg) => {
    const r = computeMuscleRecovery(exercises, logs, mg);
    return r && r.recovery < 50 ? mg : null;
  }).filter(Boolean);
  return { sessionsThisWeek, volChange, strChange, fatigueWarnings };
}

/* La API exige que el historial empiece con "user" y que los roles alternen
   estrictamente (nunca dos "assistant" seguidos). El saludo inicial fijo y los
   mensajes de confirmación de acciones pueden romper eso, así que se prolija acá. */
function buildApiHistory(messages) {
  const firstUserIdx = messages.findIndex((m) => m.role === "user");
  if (firstUserIdx === -1) return [];
  const trimmed = messages.slice(firstUserIdx);
  const merged = [];
  trimmed.forEach((m) => {
    const last = merged[merged.length - 1];
    if (last && last.role === m.role) {
      last.content += "\n" + m.text;
    } else {
      merged.push({ role: m.role, content: m.text });
    }
  });
  return merged;
}

async function askCoach(systemPrompt, history) {
  // Este entorno solo soporta exactamente model/max_tokens/messages (sin "system"),
  // así que las instrucciones van adentro del primer mensaje del historial.
  const messages = history.map((m, i) => ({
    role: m.role,
    content: [{ type: "text", text: i === 0 ? `${systemPrompt}\n\n---\n\nMensaje de Manu: ${m.content}` : m.content }],
  }));

  let response;
  try {
    response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages,
      }),
    });
  } catch (fetchErr) {
    throw new Error(`Fetch rechazado (${fetchErr.name || "?"}): ${fetchErr.message || fetchErr}`);
  }

  const raw = await response.text();
  let data;
  try {
    data = JSON.parse(raw);
  } catch {
    throw new Error(`Respuesta no-JSON (${response.status}): ${raw.slice(0, 150)}`);
  }
  if (!response.ok || data.type === "error") {
    const msg = data?.error?.message || JSON.stringify(data).slice(0, 150) || `Error ${response.status}`;
    throw new Error(msg);
  }
  const text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
  return text || "No pude responder justo ahora, probá de nuevo.";
}

/* Extrae un bloque ```action {...}``` de la respuesta del coach, si lo hay */
function parseCoachAction(text) {
  const match = text.match(/```action\s*([\s\S]*?)```/);
  if (!match) return null;
  try {
    return JSON.parse(match[1].trim());
  } catch {
    return null;
  }
}
function stripActionBlock(text) {
  return text.replace(/```action\s*[\s\S]*?```/, "").trim();
}

/* Aplica una acción confirmada sobre el array de ejercicios */
function applyCoachAction(action, exercises) {
  if (action.action === "add_exercise") {
    const series = Math.max(1, Math.min(6, Number(action.series) || 3));
    const repTarget = Math.round(((Number(action.repRangeMin) || 8) + (Number(action.repRangeMax) || 12)) / 2);
    const page = PAGES.some((p) => p.id === action.page) ? action.page : "pecho-tri";
    const newEx = {
      id: uid(),
      name: action.name || "Nuevo ejercicio",
      muscleGroup: action.muscleGroup || "General",
      page,
      dayTag: ["A", "B", "extra"].includes(action.dayTag) ? action.dayTag : null,
      active: true,
      weightUnit: action.weightUnit === "nivel" ? "nivel" : "kg",
      incrementStep: action.weightUnit === "nivel" ? 1 : 2,
      repRangeMin: Number(action.repRangeMin) || 8,
      repRangeMax: Number(action.repRangeMax) || 12,
      rir: action.rir || "-",
      warmup: "",
      notes: action.notes || "",
      targetSets: Array.from({ length: series }, (_, i) => ts(`Serie ${i + 1}`, repTarget, 0, i === 0)),
    };
    return { exercises: [...exercises, newEx], message: `Listo, agregué "${newEx.name}" a ${PAGES.find((p) => p.id === page)?.label}.` };
  }
  if (action.action === "edit_exercise") {
    const target = (action.name || "").toLowerCase();
    const match = exercises.find((e) => e.name.toLowerCase().includes(target) || target.includes(e.name.toLowerCase()));
    if (!match) return { exercises, message: `No encontré ningún ejercicio parecido a "${action.name}" — revisalo en Ajustes.`, failed: true };
    const allowed = ["repRangeMin", "repRangeMax", "rir", "notes", "warmup", "active", "page", "dayTag", "incrementStep", "weightUnit", "name"];
    const changes = {};
    Object.keys(action.changes || {}).forEach((k) => { if (allowed.includes(k)) changes[k] = action.changes[k]; });
    const updated = exercises.map((e) => (e.id === match.id ? { ...e, ...changes } : e));
    return { exercises: updated, message: `Listo, actualicé "${match.name}".` };
  }
  return null;
}

function InsightRow({ type, children }) {
  const icon = type === "stuck" ? <TrendingDown size={15} color={COLORS.textFaint} /> : type === "up" ? <TrendingUp size={15} color={COLORS.yellow} /> : <Flame size={14} color={COLORS.yellowSoft} />;
  return (
    <div className="flex items-start gap-2.5 py-2">
      <div className="shrink-0 mt-0.5">{icon}</div>
      <p className="text-[12.5px] leading-relaxed" style={{ color: type === "stuck" ? COLORS.textDim : COLORS.text, fontFamily: FONT_BODY }}>{children}</p>

}

function CoachStatsRow({ stats }) {

              <YAxis hide />
              <Tooltip
                contentStyle={{ background: "#16171B", border: `1px solid ${COLORS.border}`, borderRadius: 12, fontSize: 11 }}
                labelStyle={{ color: COLORS.textDim }}
                itemStyle={{ color: COLORS.yellow }}
                formatter={(v) => [`${v} series`, ""]}

}

function ConsistencyRing({ daysTrained, index = 0 }) {
  const goal = 7;
  const pct = Math.min(1, daysTrained / goal);
  const r = 28;
  const c = 2 * Math.PI * r;
  return (
    <div className="enter-up p-4 flex items-center gap-4" style={{  ...glass, ...stagger(index, 60), borderRadius: 30 }}>
      <svg width="72" height="72" viewBox="0 0 72 72" className="shrink-0">
        <circle cx="36" cy="36" r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="6.5" />
        <circle
          cx="36" cy="36" r={r} fill="none" stroke={COLORS.yellow} strokeWidth="6.5" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c * (1 - pct)} transform="rotate(-90 36 36)"
          style={{ transition: "stroke-dashoffset 0.6s ease" }}
        />
        <text x="36" y="41" textAnchor="middle" fontSize="17" fontWeight="800" fill={COLORS.text} fontFamily={FONT_DISPLAY}>{daysTrained}</text>
      </svg>
      <div className="min-w-0">
        <p className="text-[13.5px] font-bold" style={{ color: COLORS.text, fontFamily: FONT_BODY }}>Días entrenados</p>
        <p className="text-[11px]" style={{ color: COLORS.textDim, fontFamily: FONT_BODY }}>de los últimos 7</p>
      </div>
    </div>
  );
}

function ActionConfirmCard({ action, resolved, onConfirm, onCancel }) {
  const pageLabel = PAGES.find((p) => p.id === action.page)?.label || action.page;
  const label = action.action === "add_exercise"
    ? `Agregar "${action.name}" a ${pageLabel} · ${action.series || 3} series · ${action.repRangeMin}-${action.repRangeMax} reps`
    : `Editar "${action.name}"`;
  return (
    <div className="p-3.5 mt-1" style={{ ...glass, borderRadius: 22 }}>
      <p className="text-[12px] mb-2.5 leading-snug" style={{ color: COLORS.yellow, fontFamily: FONT_BODY }}>{label}</p>
      {resolved ? (
        <p className="text-[11.5px] flex items-center gap-1.5" style={{ color: COLORS.textDim, fontFamily: FONT_BODY }}>
          <Check size={13} color={COLORS.yellow} /> Resuelto
        </p>
      ) : (
        <div className="flex gap-2">
          <button onClick={onConfirm} className="flex-1 rounded-full py-2 text-[12px] font-bold" style={{ ...glassYellow, color: "#1A0A00" }}>Confirmar</button>
          <button onClick={onCancel} className="flex-1 rounded-full py-2 text-[12px]" style={{ ...glass, color: COLORS.textDim }}>Cancelar</button>
        </div>
      )}
    </div>
  );
}

function buildScheduleContext(completions, overrides) {
  const today = new Date();
  const rows = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const jsDay = d.getDay();
    const scheduled = WEEKLY_SCHEDULE[jsDay];
    if (!scheduled) continue;
    const key = dateKey(d);
    const actualPageId = overrides[key] || scheduled;
    const scheduledLabel = PAGES.find((p) => p.id === scheduled)?.label;
    const actualLabel = PAGES.find((p) => p.id === actualPageId)?.label;
    const has = dayHasActivity(completions, key);
    let status;
    if (i === 0) status = "es hoy";
    else if (overrides[key] && overrides[key] !== scheduled) status = `cumplido pero hizo ${actualLabel} en vez de lo programado`;
    else if (has) status = "cumplido";
    else status = "salteado";
    rows.push(`${WEEKDAY_NAMES[jsDay]} (${key}): programado ${scheduledLabel} — ${status}`);
  }
  return `Horario fijo semanal: Lunes y Jueves Pecho·Tríceps, Martes y Viernes Espalda·Bíceps, Miércoles y Sábado Hombros·Piernas·Abs, Domingo descanso.\nÚltimos 7 días:\n${rows.join("\n")}`;
}

function CoachScreen({ exercises, logs, completions, overrides, onUpdateExercises }) {
  const insights = useMemo(() => computeInsights(exercises, logs), [exercises, logs]);
  const freqFlags = useMemo(() => computeFrequencyInsights(exercises, logs), [exercises, logs]);
  const weeklyVolume = useMemo(() => computeWeeklyVolume(exercises, logs), [exercises, logs]);
  const daysTrained7 = useMemo(() => computeDaysTrainedLast7(exercises, logs), [exercises, logs]);
  const weeklySummary = useMemo(() => computeWeeklySummary(exercises, logs, completions), [exercises, logs, completions]);
  const muscleSets = useMemo(() => computeMuscleSetsWeek(exercises, logs), [exercises, logs]);
  const context = useMemo(() => buildCoachContext(exercises, logs), [exercises, logs]);
  const scheduleContext = useMemo(() => buildScheduleContext(completions, overrides), [completions, overrides]);

  const [messages, setMessages] = useState([
    { role: "assistant", text: "Hola Manu. Soy tu coach acá adentro — veo tu historial real de pesos, series y frecuencia. Preguntame lo que necesites, pedime que agregue o cambie algo de tu rutina, o si te salteaste un día, decime y vemos cómo reorganizar." },
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [resolvedIdx, setResolvedIdx] = useState(() => new Set());
  const scrollRef = useRef(null);

  useEffect(() => {
    scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: "smooth" });
  }, [messages, loading]);

  const activeExNames = exercises.filter((e) => e.active).map((e) => e.name).join(", ");

  const systemPrompt = `Sos el coach personal de hipertrofia de Manu, dentro de su app "Bull Workout". Conocés su historial real de entrenamiento y PODÉS modificar su rutina cuando te lo pida explícitamente.

Hablale como un entrenador con experiencia: directo, concreto, sin vueltas — señalá estancamientos y problemas de frecuencia cuando los haya, empujalo a progresar, pero siempre respetuoso y constructivo. Respondé en español rioplatense, en mensajes cortos (máximo 4-5 líneas) salvo que pida un análisis largo. No inventes números que no te dí.

Si Manu te cuenta que se salteó un día o pregunta cómo reorganizar la semana, usá el horario fijo de abajo para decirle concretamente qué hacer: si conviene correr el día siguiente, fusionar volumen, o simplemente seguir con el día que toca sin compensar (evitando que se le desordene la frecuencia de cada grupo).

CAPACIDAD DE EDICIÓN: si Manu pide agregar o modificar un ejercicio, después de tu respuesta en texto agregá, al final del mensaje, un bloque con este formato exacto (las páginas válidas son pecho-tri, espalda-bi, hombros):
\`\`\`action
{"action":"add_exercise","name":"...","muscleGroup":"...","page":"pecho-tri","dayTag":null,"repRangeMin":8,"repRangeMax":12,"series":3,"weightUnit":"kg","rir":"...","notes":"..."}
\`\`\`
o para editar uno que ya existe (de esta lista: ${activeExNames}):
\`\`\`action
{"action":"edit_exercise","name":"nombre exacto o parecido","changes":{"repRangeMax":12,"notes":"..."}}
\`\`\`
Solo incluí el bloque si hay un pedido concreto de agregar/editar — nunca lo apliques vos solo, Manu confirma desde la app. Si es solo una pregunta, no incluyas ningún bloque.

${scheduleContext}

Su historial reciente, por ejercicio (serie principal):
${context}

Frecuencia por grupo muscular (últimos 30 días):
${freqFlags.length ? freqFlags.map((f) => f.text).join("\n") : "Sin alertas de frecuencia detectadas — viene parejo."}`;

  async function handleSend() {
    const text = input.trim();
    if (!text || loading) return;
    const userMsg = { role: "user", text };
    const next = [...messages, userMsg];
    setMessages(next);
    setInput("");
    setLoading(true);
    try {
      const apiHistory = buildApiHistory(next);
      const reply = await askCoach(systemPrompt, apiHistory);
      const action = parseCoachAction(reply);
      const displayText = action ? stripActionBlock(reply) : reply;
      setMessages((prev) => [...prev, { role: "assistant", text: displayText, action }]);
    } catch (e) {
      setMessages((prev) => [...prev, { role: "assistant", text: `No pude conectarme: ${e.message || "error desconocido"}. Probá de nuevo.` }]);
    } finally {
      setLoading(false);
    }
  }

  function handleConfirmAction(i, action) {
    const result = applyCoachAction(action, exercises);
    setResolvedIdx((prev) => new Set(prev).add(i));
    if (result) {
      if (!result.failed) onUpdateExercises(result.exercises);
      setMessages((prev) => [...prev, { role: "assistant", text: result.message }]);
    }
  }
  function handleCancelAction(i) {
    setResolvedIdx((prev) => new Set(prev).add(i));
    setMessages((prev) => [...prev, { role: "assistant", text: "Dale, no hago el cambio." }]);
  }

  return (
    <div className="flex flex-col" style={{ height: "100vh" }}>
      <TopBar title="Coach" />
      <div className="flex-1 overflow-y-auto">
        <div className="px-4 pt-4">
          <CoachStatsRow
            stats={[
              { value: daysTrained7, label: "Días / 7" },
              { value: exercises.filter((e) => e.active).length, label: "Ejercicios" },
              { value: insights.progressing.length, label: "En progreso" },
            ]}
          />
        </div>

        <div className="px-4 mt-4">
          <WeeklyVolumeChart data={weeklyVolume} index={0} />
        </div>

        <div className="px-4 mt-3">
          <ProgressionChart exercises={exercises} logs={logs} />
        </div>

        <div className="px-4 mt-3">
          <ConsistencyRing daysTrained={daysTrained7} index={1} />
        </div>

        <div className="px-4 mt-3 pb-3">
          <WeeklySummaryCard summary={weeklySummary} />
          <MuscleVolumeCard muscleSets={muscleSets} />
          <div className="enter-up p-4" style={{  ...glass, ...stagger(2, 60), borderRadius: 30 }}>
            <p className="text-[10.5px] font-bold uppercase tracking-wide mb-1.5" style={{ color: COLORS.yellow, fontFamily: FONT_BODY }}>Cómo venís</p>
            {insights.stuck.length === 0 && insights.progressing.length === 0 && freqFlags.length === 0 ? (
              <p className="text-[12.5px]" style={{ color: COLORS.textDim, fontFamily: FONT_BODY }}>Todavía no hay suficientes registros para analizar tendencias. Cargá un par de entrenamientos más.</p>
            ) : (
              <div className="divide-y" style={{ borderColor: "rgba(255,255,255,0.06)" }}>
                {insights.progressing.map((p, i) => (
                  <InsightRow key={`p${i}`} type="up">
                    <strong style={{ color: COLORS.text }}>{p.name}</strong> viene subiendo: {p.from.weight}{p.unit}×{p.from.reps} → {p.to.weight}{p.unit}×{p.to.reps}.
                  </InsightRow>
                ))}
                {insights.stuck.map((s, i) => (
                  <InsightRow key={`s${i}`} type="stuck">
                    <strong style={{ color: COLORS.textDim }}>{s.name}</strong> estancado en {s.weight}{s.unit} hace {s.n} registros.
                  </InsightRow>
                ))}
                {freqFlags.map((f, i) => (
                  <InsightRow key={`f${i}`} type="freq">{f.text}</InsightRow>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="px-4 flex flex-col gap-2.5 pb-3">
          {messages.map((m, i) => (
            <div key={i} className={`enter-up max-w-[85%] ${m.role === "user" ? "self-end" : "self-start"}`}>
              <div
                className="px-4 py-2.5"
                style={m.role === "user" ? { ...glassYellow, color: "#1A0A00", borderRadius: 24 } : { ...glass, borderRadius: 24 }}
              >
                <p className="text-[13px] leading-relaxed whitespace-pre-wrap" style={{ color: m.role === "user" ? "#1A0A00" : COLORS.text, fontFamily: FONT_BODY, fontWeight: m.role === "user" ? 600 : 400 }}>
                  {m.text}
                </p>
              </div>
              {m.action && (
                <ActionConfirmCard
                  action={m.action}
                  resolved={resolvedIdx.has(i)}
                  onConfirm={() => handleConfirmAction(i, m.action)}
                  onCancel={() => handleCancelAction(i)}
                />
              )}
            </div>
          ))}
          {loading && (
            <div className="self-start px-4 py-3" style={{ ...glass, borderRadius: 24 }}>
              <p className="text-[12px]" style={{ color: COLORS.textFaint, fontFamily: FONT_MONO }}>escribiendo...</p>
            </div>
          )}
          <div ref={scrollRef} />
        </div>
      </div>

      <div className="px-4 pb-28 pt-2 shrink-0">
        <div className="flex items-center gap-2 rounded-full p-1.5" style={glass}>
          <input
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && handleSend()}
            placeholder="Preguntale o pedile un cambio a tu coach..."
            className="flex-1 bg-transparent outline-none px-3 text-[13.5px]"
            style={{ color: COLORS.text, fontFamily: FONT_BODY }}
          />
          <button
            onClick={handleSend}
            disabled={loading || !input.trim()}
            className="w-10 h-10 rounded-full flex items-center justify-center shrink-0 active:scale-90 transition-transform disabled:opacity-40"
            style={{ ...glassYellow }}
          >
            <Send size={16} color="#1A0A00" />
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   APP ROOT
   ============================================================ */

function App() {
  const [loading, setLoading] = useState(true);
  const [exercises, setExercises] = useState([]);
  const [logs, setLogs] = useState({});
  const [completions, setCompletions] = useState({});
  const [overrides, setOverrides] = useState({});
  const [screen, setScreen] = useState({ name: "home" });

  useEffect(() => {
    (async () => {
      let ex = await loadExercises();
      const lg = await loadLogs();
      const cp = await loadCompletions();
      const ov = await loadOverrides();
      if (!ex || !ex[0] || !ex[0].page) {
        // Esquema viejo o primera vez: sembramos el dataset nuevo.
        // El historial de series (gym-logs) no se toca — sigue intacto.
        ex = DEFAULT_EXERCISES;
        await saveExercises(ex);
      }
      setExercises(ex);
      setLogs(lg);
      setCompletions(cp);
      setOverrides(ov);
      setLoading(false);
    })();
  }, []);

  async function handleSetOverride(dayKey, pageId) {
    setOverrides((prev) => {
      const next = { ...prev, [dayKey]: pageId };
      saveOverrides(next);
      return next;
    });
  }

  async function handleSaveLog(exerciseId, entry) {
    setLogs((prev) => {
      const arr = prev[exerciseId] || [];
      const lastEntry = arr[arr.length - 1];
      const sameDay = lastEntry && new Date(lastEntry.date).toDateString() === new Date(entry.date).toDateString();
      const nextArr = sameDay ? [...arr.slice(0, -1), entry] : [...arr, entry];
      const next = { ...prev, [exerciseId]: nextArr };
      saveLogs(next);
      return next;
    });
  }

  async function handleToggleDone(exerciseId, value) {
    const key = dateKey();
    setCompletions((prev) => {
      const day = { ...(prev[key] || {}), [exerciseId]: value };
      const next = { ...prev, [key]: day };
      saveCompletions(next);
      return next;
    });
  }

  async function handleSaveExercise(updated) {
    setExercises((prev) => {
      const next = prev.map((e) => (e.id === updated.id ? updated : e));
      saveExercises(next);
      return next;
    });
    setScreen(screen.from || { name: "home" });
  }

  async function handleDeleteExercise(id) {
    setExercises((prev) => {
      const next = prev.filter((e) => e.id !== id);
      saveExercises(next);
      return next;
    });
    setScreen({ name: "home" });
  }

  async function handleToggleActive(id) {
    setExercises((prev) => {
      const next = prev.map((e) => (e.id === id ? { ...e, active: !e.active } : e));
      saveExercises(next);
      return next;
    });
  }

  async function handleAddNew(pageId) {
    const newEx = {
      id: uid(), name: "Nuevo ejercicio", muscleGroup: "General",
      page: pageId || "pecho-tri", dayTag: null, active: true, weightUnit: "kg", incrementStep: 2,
      repRangeMin: 8, repRangeMax: 12, rir: "-", warmup: "", notes: "",
      targetSets: [ts("Serie 1", 10, 0, true)],
    };
    setExercises((prev) => {
      const next = [...prev, newEx];
      saveExercises(next);
      return next;
    });
    setScreen({ name: "edit", id: newEx.id, from: screen });
  }

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: COLORS.bg }}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');`}</style>
        <AmbientGlow />
        <div className="relative flex flex-col items-center gap-3">
          <Dumbbell size={28} color={COLORS.yellow} className="animate-pulse" />
          <p className="text-[12px] uppercase tracking-wide" style={{ color: COLORS.textDim, fontFamily: FONT_BODY }}>Cargando rutina...</p>
        </div>
      </div>
    );
  }

  let content = null;
  let screenKey = screen.name;

  if (screen.name === "home") {
    content = (
      <HomeScreen
        exercises={exercises}
        logs={logs}
        completions={completions}
        overrides={overrides}
        onOpenPage={(id) => setScreen({ name: "page", id })}
        onSetOverride={handleSetOverride}
      />
    );
  } else if (screen.name === "page") {
    const page = PAGES.find((p) => p.id === screen.id);
    screenKey = `page-${screen.id}`;
    const completionsToday = completions[dateKey()] || {};
    content = (
      <PageScreen
        page={page}
        exercises={exercises}
        logs={logs}
        onBack={() => setScreen({ name: "home" })}
        onSaveLog={handleSaveLog}
        onEdit={(id) => setScreen({ name: "edit", id, from: screen })}
        onAddExercise={handleAddNew}
        completionsToday={completionsToday}
        onToggleDone={handleToggleDone}
      />
    );
  } else if (screen.name === "edit") {
    const exercise = exercises.find((e) => e.id === screen.id);
    screenKey = `edit-${screen.id}`;
    content = (
      <EditExerciseScreen
        exercise={exercise}
        onBack={() => setScreen(screen.from || { name: "settings" })}
        onSave={handleSaveExercise}
        onDelete={handleDeleteExercise}
      />
    );
  } else if (screen.name === "coach") {
    content = (
      <CoachScreen
        exercises={exercises}
        logs={logs}
        completions={completions}
        overrides={overrides}
        onUpdateExercises={(next) => {
          setExercises(next);
          saveExercises(next);
        }}
      />
    );
  } else if (screen.name === "settings") {
    content = (
      <SettingsScreen
        exercises={exercises}
        onBack={() => setScreen({ name: "home" })}
        onEdit={(id) => setScreen({ name: "edit", id, from: { name: "settings" } })}
        onAddNew={handleAddNew}
        onToggleActive={handleToggleActive}
      />
    );
  }

  return (
    <div className="min-h-screen relative" style={{ background: COLORS.bg, fontFamily: FONT_BODY, color: COLORS.text }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
        input, textarea, select { font-family: 'Inter', sans-serif; }
        input:focus, textarea:focus, select:focus { border-color: ${COLORS.yellow} !important; box-shadow: 0 0 0 2px rgba(255,122,41,0.15); }
        ::placeholder { color: ${COLORS.textDim}; opacity: 0.6; }
        input[type="checkbox"] { accent-color: ${COLORS.yellow}; width: 17px; height: 17px; }
        ${ENTER_ANIM_CSS}
      `}</style>
      <AmbientGlow />
      <div className="relative" key={screenKey}>{content}</div>
      <BottomNav
        active={screen.name === "settings" ? "settings" : screen.name === "coach" ? "coach" : "home"}
        onNavigate={(id) => setScreen({ name: id })}
      />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
